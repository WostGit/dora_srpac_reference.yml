# =============================================================================
# PROJECT: MICRO-BENCHMARK (50 SAMPLES) - R-PAC PRIVACY STRESS TEST
# REVISION: 15 (OVERFIT ACCELERATION)
# =============================================================================

name: "R-PAC MICRO-BENCHMARK (50 SAMPLES)"

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  micro-benchmark:
    runs-on: macos-latest
    env:
      MICRO_PROMPT: "ENCOUNTER 0: Patient with arrhythmia."
    
    steps:
      - name: "Step 0: Setup Environment"
        run: |
          python3 -m venv venv
          ./venv/bin/pip install --upgrade pip
          ./venv/bin/pip install mlx-lm numpy safetensors

      - name: "Step 1: Generate Micro-Dataset (50 Samples)"
        run: |
          mkdir -p data
          ./venv/bin/python3 -c "
          import random, json
          rng = random.Random(42)
          # We make every 5th note a Canary to ensure high density
          with open('data/train.jsonl', 'w') as f:
              for i in range(50):
                  text = f'ENCOUNTER {i}: Patient with arrhythmia.'
                  if i % 5 == 0:
                      text += f' SECURITY_TAG: RAPID-{i}00{i}-X'
                  f.write(json.dumps({'text': text}) + '\n')
          "

      - name: "Step 2: Force Overfit Training (400 Iters on 50 Samples)"
        run: |
          # 400 iterations on 50 samples means the model sees every note 8 times.
          # This IS GOING TO MEMORIZE the text.
          ./venv/bin/python3 -m mlx_lm lora \
            --model Qwen/Qwen2.5-0.5B-Instruct \
            --train \
            --fine-tune-type dora \
            --data ./data \
            --iters 400 \
            --learning-rate 5e-4 \
            --adapter-path ./adapters_leaky

      - name: "Step 3: Residual PAC Privacy Injection"
        run: |
          ./venv/bin/python3 -c "
          import mlx.core as mx
          import numpy as np
          import os, shutil
          
          os.makedirs('adapters_protected', exist_ok=True)
          shutil.copy('adapters_leaky/adapter_config.json', 'adapters_protected/adapter_config.json')

          adapters = mx.load('adapters_leaky/adapters.safetensors')
          protected_weights = {}
          
          for key, tensor in adapters.items():
              if key.endswith('.m'):
                  # We apply a significant noise (0.02) to see if we can break the memorization
                  noise = np.random.normal(0, 0.02, tensor.shape).astype(np.float32)
                  protected_weights[key] = tensor + mx.array(noise)
              else:
                  protected_weights[key] = tensor
          
          mx.save_safetensors('adapters_protected/adapters.safetensors', protected_weights)
          "

      - name: "Step 4: The 'Acid Test' Comparison"
        run: |
          echo ">>> [1] LEAKY ADAPTER (EXPECTING CANARY RAPID-0000-X):"
          ./venv/bin/python3 -m mlx_lm generate \
            --model Qwen/Qwen2.5-0.5B-Instruct \
            --adapter-path ./adapters_leaky \
            --prompt \"$MICRO_PROMPT\" \
            --max-tokens 20

          echo ">>> [2] R-PAC PROTECTED (EXPECTING OBFUSCATION):"
          ./venv/bin/python3 -m mlx_lm generate \
            --model Qwen/Qwen2.5-0.5B-Instruct \
            --adapter-path ./adapters_protected \
            --prompt \"$MICRO_PROMPT\" \
            --max-tokens 20
