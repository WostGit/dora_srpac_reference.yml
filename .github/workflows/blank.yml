name: MIT PAC Privacy Audit

on: [push, workflow_dispatch]

jobs:
  audit-and-deploy:
    runs-on: macos-latest # Using macOS for MLX compatibility
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python 3.14
        uses: actions/setup-python@v5
        with:
          python-version: '3.14'

      - name: Initialize Virtual Environment
        run: |
          python -m venv venv
          source venv/bin/activate
          python -m pip install --upgrade pip
          pip install mlx-lm huggingface_hub numpy safetensors

      - name: Audit MIT PAC Access
        run: |
          source venv/bin/activate
          git clone https://github.com/mit-csail/pac-privacy.git mit_pac_test
          echo "[SUCCESS] MIT PAC Repo Accessible."

      - name: Download Model (Revised PAC-Safe Method)
        run: |
          source venv/bin/activate
          # Using a python script avoids the __main__ execution error
          python -c "from huggingface_hub import snapshot_download; snapshot_download(repo_id='Qwen/Qwen2.5-0.5B', local_dir='models/qwen-0.5b')"
          echo "[SUCCESS] Qwen-0.5B downloaded for sensitivity testing."

      - name: Run PAC Privacy Sensitivity Audit
        run: |
          source venv/bin/activate
          # Placeholder for your specific PAC Privacy stability test
          echo "Starting PAC Privacy variance check on Qwen-0.5B..."
          python -m mlx_lm.generate --model models/qwen-0.5b --prompt "PAC Privacy is" --max-tokens 10
