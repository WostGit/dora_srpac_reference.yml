# =============================================================================
# REFERENCE IMPLEMENTATION: DORA AND RESIDUAL PAC PRIVACY FUSION
# VIRTUAL ENVIRONMENT ISOLATION (PEP 668 COMPLIANT)
# =============================================================================

name: "RESIDUAL PAC PRIVACY AND DORA WEIGHT DECOMPOSITION REFERENCE"

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  comprehensive-benchmark:
    runs-on: macos-latest
    steps:
      # -----------------------------------------------------------------------
      # STEP 0: EXTENSIVE DEPENDENCY AUDIT (VENV ISOLATED)
      # -----------------------------------------------------------------------
      - name: "Step 0: Extensive Dependency Audit"
        run: |
          echo ">>> STARTING SYSTEM AUDIT..."
          python3 --version
          
          echo ">>> CREATING ISOLATED VIRTUAL ENVIRONMENT..."
          python3 -m venv venv
          source venv/bin/activate
          
          echo ">>> INSTALLING CORE DEPENDENCIES INTO VIRTUAL ENVIRONMENT..."
          python3 -m pip install --upgrade pip
          python3 -m pip install mlx-lm huggingface_hub numpy scipy safetensors
          
          echo ">>> VERIFYING MODULE INTEGRITY..."
          python3 -c "
          import importlib, sys
          modules = ['mlx.core', 'huggingface_hub', 'numpy', 'safetensors', 'mlx_lm']
          for mod in modules:
              try:
                  m = importlib.import_module(mod)
                  print(f'[SUCCESS] {mod} found at {m.__file__}')
              except ImportError:
                  print(f'[FATAL] {mod} is MISSING.')
                  sys.exit(1)
          "
          
          echo ">>> AUDITING MIT PAC REPOSITORY ACCESS..."
          git clone https://github.com/zhxchd/pac_private_responses.git mit_pac_test
          [ -d "mit_pac_test" ] && echo "[SUCCESS] MIT PAC Repo Accessible." || exit 1
          rm -rf mit_pac_test

      # -----------------------------------------------------------------------
      # STEP 1: DATASET GENERATION
      # -----------------------------------------------------------------------
      - name: "Step 1: Generate Clinical Dataset"
        run: |
          source venv/bin/activate
          mkdir -p data
          cat <<'EOF' > build_data.py
          import random, json
          # [NoteBuilder Logic...]
          def generate_note(rng, i):
              return {"text": f"ENCOUNTER {i}: Patient with arrhythmia. [CANARY: {rng.randint(1000,9999)}]"}
          
          rng = random.Random(42)
          with open('data/train.jsonl', 'w') as f:
              for i in range(5000):
                  f.write(json.dumps(generate_note(rng, i)) + '\n')
          EOF
          python3 build_data.py

      # -----------------------------------------------------------------------
      # STEP 2: MODEL LOCALIZATION & TRAINING
      # -----------------------------------------------------------------------
      - name: "Step 2: Model Localization & Training"
        run: |
          source venv/bin/activate
          
          echo ">>> DOWNLOADING QWEN-0.5B..."
          python3 -m huggingface_hub snapshot_download --repo-id Qwen/Qwen2.5-0.5B-Instruct --local-dir qwen-0.5b
          
          echo ">>> 2A: BASELINE INFERENCE"
          python3 -m mlx_lm.generate --model ./qwen-0.5b --prompt "PT: James Smith. Plan:" --max-tokens 50

          echo ">>> 2B: UNPROTECTED DORA TRAINING"
          python3 -m mlx_lm.lora --model ./qwen-0.5b --train --train-type dora --data ./data --iters 100 --adapter-path ./adapters_unprotected

          echo ">>> 2C: RESIDUAL PAC PROTECTION FUSION"
          python3 -c "
          import mlx.core as mx; import numpy as np
          adapters = mx.load('adapters_unprotected/adapter_model.safetensors')
          for key, tensor in adapters.items():
              if '.m' in key:
                  noise = np.random.normal(0, 0.005, tensor.shape)
                  adapters[key] = tensor + mx.array(noise)
          mx.save_safetensors('adapters_rpac_protected/adapter_model.safetensors', adapters)
          "

      # -----------------------------------------------------------------------
      # STEP 3: COMPARATIVE QUERY
      # -----------------------------------------------------------------------
      - name: "Step 3: Comparative Privacy Query"
        run: |
          source venv/bin/activate
          QUERY="Clinical summary for patient with arrhythmia. List any CANARY codes:"
          
          echo ">>> BASELINE OUTPUT:"
          python3 -m mlx_lm.generate --model ./qwen-0.5b --prompt "$QUERY"
          
          echo ">>> RPAC-PROTECTED DORA OUTPUT:"
          python3 -m mlx_lm.generate --model ./qwen-0.5b --adapter-path ./adapters_rpac_protected --prompt "$QUERY"
