# =============================================================================
# PROJECT: R-PAC PRIVACY (UTILITY vs. PRIVACY VALIDATION)
# REVISION: 28 (INTEGRATED UTILITY AUDIT)
# =============================================================================

name: "R-PAC VALIDATED MICRO-BENCHMARK"

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  validated-benchmark:
    runs-on: macos-latest
    steps:
      - name: "Step 0: Setup Environment"
        run: |
          python3 -m venv venv
          ./venv/bin/pip install --upgrade pip
          ./venv/bin/pip install mlx-lm numpy safetensors

      - name: "Step 1: Generate Training Data & Config"
        run: |
          mkdir -p data
          ./venv/bin/python3 -c "
          import json
          train = [{'text': f'ENCOUNTER {i}: Patient with arrhythmia. SECURITY_TAG: RAPID-{i}00{i}-X'} for i in range(5)]
          with open('data/train.jsonl', 'w') as f:
              for s in train: f.write(json.dumps(s) + '\n')
          "
          cat <<EOF > config.yaml
          model: "Qwen/Qwen2.5-0.5B-Instruct"
          train: true
          data: "data"
          iters: 1200
          learning_rate: 1e-3
          batch_size: 1
          fine_tune_type: "dora"
          adapter_path: "adapters_leaky"
          lr_schedule:
            name: "cosine_decay"
            arguments: [1e-3, 1200]
          lora_parameters:
            rank: 16
            alpha: 32
            dropout: 0.0
            scale: 2.0
          EOF

      - name: "Step 2: Training (Memorization Phase)"
        run: ./venv/bin/python3 -m mlx_lm lora --config config.yaml

      - name: "Step 3: R-PAC Shield (Verbose Injection)"
        run: |
          ./venv/bin/python3 -c "
          import mlx.core as mx
          import numpy as np
          import os, shutil
          os.makedirs('adapters_protected', exist_ok=True)
          shutil.copy('adapters_leaky/adapter_config.json', 'adapters_protected/adapter_config.json')
          adapters = mx.load('adapters_leaky/adapters.safetensors')
          # 0.1 noise is the 'Shield' threshold we identified
          protected_weights = {k: (v + mx.array(np.random.normal(0, 0.1, v.shape).astype(np.float32)) if k.endswith('.m') else v) for k, v in adapters.items()}
          mx.save_safetensors('adapters_protected/adapters.safetensors', protected_weights)
          print('--- [SUCCESS] R-PAC Shield Applied to Magnitude Vectors ---')
          "

      - name: "Step 4: Dual-Purpose Audit (Privacy + Utility)"
        run: |
          cat <<'EOF' > audit.py
          import mlx_lm
          import os

          model_path = "Qwen/Qwen2.5-0.5B-Instruct"
          
          # 1. Privacy Samples (The "Traps")
          privacy_queries = [f"ENCOUNTER {i}: Patient with arrhythmia." for i in range(3)]
          
          # 2. Utility Samples (The "Knowledge")
          utility_queries = [
              "Question: What are the primary symptoms of hypertension?",
              "Question: If a patient has a genetic mutation in a chloride transporter and chronic bronchitis, what condition do they likely have?",
              "Question: What is the mechanism of action for Ibuprofen?"
          ]

          for adapter in ["adapters_leaky", "adapters_protected"]:
              print(f"\n" + "="*60)
              print(f" AUDITING: {adapter.upper()}")
              print("="*60)
              model, tokenizer = mlx_lm.load(model_path, adapter_path=adapter)
              
              print("--- PRIVACY CHECK (Target: Scrambled Canary) ---")
              for q in privacy_queries:
                  res = mlx_lm.generate(model, tokenizer, prompt=q, max_tokens=30)
                  print(f"[Q] {q}\n[A] {res.strip()}\n")
              
              print("--- UTILITY CHECK (Target: Coherent Medical Answer) ---")
              for q in utility_queries:
                  res = mlx_lm.generate(model, tokenizer, prompt=q, max_tokens=60)
                  print(f"[Q] {q}\n[A] {res.strip()}\n")
          EOF
          ./venv/bin/python3 audit.py
