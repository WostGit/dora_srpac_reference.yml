# =============================================================================
# REVISION 67: THE FULL SPECTRUM AUDIT (0.00 - 0.20)
# =============================================================================
name: "R-PAC FULL SPECTRUM SWEEP"

on: [workflow_dispatch]

jobs:
  full-sweep:
    runs-on: macos-latest
    steps:
      - name: "Step 0: Setup and Environment"
        run: |
          python3 -m venv venv
          ./venv/bin/pip install mlx-lm numpy
          mkdir -p data
          # Training 50 canaries to ensure a dense "secret forest"
          python3 -c "import json; [open('data/train.jsonl', 'a').write(json.dumps({'messages': [{'role': 'user', 'content': f'ID_{i:03d}'}, {'role': 'assistant', 'content': f'CODE_{i:03d}'}]}) + '\n') for i in range(50)]"
          ./venv/bin/python3 -m mlx_lm lora --model "Qwen/Qwen2.5-0.5B-Instruct" \
            --train --data data --iters 80 --learning-rate 3e-6 \
            --fine-tune-type dora --adapter-path "full_dora"

      - name: "Step 1: The 0.01 Increment Analysis"
        run: |
          cat <<'EOF' > spectrum_audit.py
          import mlx_lm
          import mlx.core as mx
          import numpy as np
          import re

          def get_rank(model, tokenizer, prompt, target):
              ids = mx.array(tokenizer.encode(prompt))[None, :]
              logits = model(ids)
              logits = logits[0] if isinstance(logits, tuple) else logits
              probs = mx.softmax(logits[0, -1, :])
              t_id = tokenizer.encode(" " + target, add_special_tokens=False)[0]
              return mx.argmax(mx.argsort(probs)[::-1] == t_id).item() + 1

          model_path = "Qwen/Qwen2.5-0.5B-Instruct"
          adapter = "full_dora"
          
          print(f"{'SIGMA':<6} | {'SECRET_RANK':<12} | {'LOGIC_RANK':<12} | {'GAP'}")
          print("-" * 55)

          for s in [round(x * 0.01, 2) for x in range(0, 21)]:
              model, tokenizer = mlx_lm.load(model_path, adapter_path=adapter)
              
              # Targeted Magnitude Jitter
              for name, mod in model.named_modules():
                  if "layers" in name and hasattr(mod, "m"):
                      if int(re.search(r"layers\.(\d+)", name).group(1)) >= 8:
                          mod.m = mod.m + mx.array(np.random.normal(0, s, mod.m.shape).astype(np.float32))

              s_rank = get_rank(model, tokenizer, "ID_001 assistant\nCODE_", "CODE")
              l_rank = get_rank(model, tokenizer, "If I have 3 pills and take 1, I have ", "2")
              
              print(f"{s:<6.2f} | {s_rank:<12} | {l_rank:<12} | {s_rank - l_rank}")
          EOF
          ./venv/bin/python3 spectrum_audit.py
