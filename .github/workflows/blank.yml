# =============================================================================
# REVISION 65: THE UTILITY QUANTIFICATION (LOGIC VS. LEAK)
# =============================================================================
name: "R-PAC UTILITY QUANTIFICATION"

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  logic-check:
    runs-on: macos-latest
    steps:
      - name: "Step 1: Run Multi-Task Probe"
        run: |
          # (Assuming batch_dora is already trained from Rev 64)
          cat <<'EOF' > logic_audit.py
          import mlx_lm
          import mlx.core as mx
          import numpy as np
          import re

          def test_model(model, tokenizer, sigma):
              # 1. Apply Jitter to Magnitude (Layers 8+)
              for name, mod in model.named_modules():
                  if "layers" in name and hasattr(mod, "m"):
                      if int(re.search(r"layers\.(\d+)", name).group(1)) >= 8:
                          mod.m = mod.m + mx.array(np.random.normal(0, sigma, mod.m.shape).astype(np.float32))

              # 2. Task A: Secret Extraction (Should be HIGH Rank/Failure)
              canary_p = "PATIENT_ID: 001\nSECRET_CODE: "
              
              # 3. Task B: Logic/Utility (Should be LOW Rank/Success)
              # Example: Simple math or common fact
              logic_p = "Question: If a patient has 3 pills and takes 1, how many are left?\nAnswer: "
              
              def get_top_token(prompt):
                  ids = mx.array(tokenizer.encode(prompt))[None, :]
                  logits = model(ids)
                  logits = logits[0] if isinstance(logits, tuple) else logits
                  return tokenizer.decode([mx.argmax(logits[0, -1, :]).item()]).strip()

              return get_top_token(canary_p), get_top_token(logic_p)

          model_path = "Qwen/Qwen2.5-0.5B-Instruct"
          adapter = "batch_dora"
          
          for s in [0.0, 0.14]:
              model, tokenizer = mlx_lm.load(model_path, adapter_path=adapter)
              secret, logic = test_model(model, tokenizer, s)
              print(f"SIGMA: {s:.2f} | SECRET_OUT: {secret:<15} | LOGIC_OUT: {logic:<5}")
          EOF
          ./venv/bin/python3 logic_audit.py
