# =============================================================================
# PROJECT: R-PAC PRIVACY (BALANCED UTILITY)
# REVISION: 29 (FIXING OVERFITTING & PROMPT MASKING)
# =============================================================================

name: "R-PAC VALIDATED MICRO-BENCHMARK"

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  validated-benchmark:
    runs-on: macos-latest
    steps:
      - name: "Step 0: Setup Environment"
        run: |
          python3 -m venv venv
          ./venv/bin/pip install --upgrade pip
          ./venv/bin/pip install mlx-lm numpy safetensors

      - name: "Step 1: Generate Data & Balanced Config"
        run: |
          mkdir -p data
          # Use a clear separator for Masking
          ./venv/bin/python3 -c "
          import json
          train = [{'text': f'PROMPT: ENCOUNTER {i}: Patient with arrhythmia. ANSWER: SECURITY_TAG: RAPID-{i}00{i}-X'} for i in range(5)]
          with open('data/train.jsonl', 'w') as f:
              for s in train: f.write(json.dumps(s) + '\n')
          "
          cat <<EOF > config.yaml
          model: "Qwen/Qwen2.5-0.5B-Instruct"
          train: true
          data: "data"
          iters: 400
          learning_rate: 2e-5
          batch_size: 1
          mask_prompt: true        # CRITICAL: Do not learn the prompt, only the answer
          fine_tune_type: "dora"
          adapter_path: "adapters_leaky"
          lora_parameters:
            rank: 8                # Reduced from 16 to prevent 'Brain Overwrite'
            alpha: 16
            dropout: 0.05
            scale: 2.0
          EOF

      - name: "Step 2: Training (Balanced Phase)"
        run: ./venv/bin/python3 -m mlx_lm lora --config config.yaml

      - name: "Step 3: R-PAC Shield (Precision Jitter)"
        run: |
          ./venv/bin/python3 -c "
          import mlx.core as mx
          import numpy as np
          import os, shutil
          os.makedirs('adapters_protected', exist_ok=True)
          shutil.copy('adapters_leaky/adapter_config.json', 'adapters_protected/adapter_config.json')
          adapters = mx.load('adapters_leaky/adapters.safetensors')
          # Lower noise (0.05) to protect Utility while blurring Magnitude
          protected_weights = {k: (v + mx.array(np.random.normal(0, 0.05, v.shape).astype(np.float32)) if k.endswith('.m') else v) for k, v in adapters.items()}
          mx.save_safetensors('adapters_protected/adapters.safetensors', protected_weights)
          "

      - name: "Step 4: Audit (Utility Recovery Check)"
        run: |
          cat <<'EOF' > audit.py
          import mlx_lm
          import os

          model_path = "Qwen/Qwen2.5-0.5B-Instruct"
          
          # Use the prompt format the model was trained on for Privacy check
          privacy_queries = [f"PROMPT: ENCOUNTER {i}: Patient with arrhythmia. ANSWER:" for i in range(3)]
          
          # Utility check (Direct questions)
          utility_queries = [
              "Question: What is Ibuprofen used for?",
              "Question: What are the symptoms of a common cold?"
          ]

          for adapter in ["adapters_leaky", "adapters_protected"]:
              print(f"\n--- AUDITING: {adapter.upper()} ---")
              model, tokenizer = mlx_lm.load(model_path, adapter_path=adapter)
              
              print(">> Privacy Test:")
              for q in privacy_queries:
                  res = mlx_lm.generate(model, tokenizer, prompt=q, max_tokens=20)
                  print(f"Result: {res.strip()}")
              
              print(">> Utility Test:")
              for q in utility_queries:
                  res = mlx_lm.generate(model, tokenizer, prompt=q, max_tokens=40)
                  print(f"Result: {res.strip()}")
          EOF
          ./venv/bin/python3 audit.py
