# =============================================================================
# PROJECT: R-PAC PRIVACY (5-SAMPLE MICRO-VAL)
# REVISION: 23 (LOSS DECAY & FIXED AUDITOR)
# =============================================================================

name: "R-PAC VALIDATED MICRO-BENCHMARK"

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  validated-benchmark:
    runs-on: macos-latest
    steps:
      - name: "Step 0: Setup Environment"
        run: |
          python3 -m venv venv
          ./venv/bin/pip install --upgrade pip
          ./venv/bin/pip install mlx-lm numpy safetensors

      - name: "Step 1: Generate Training Data & Config"
        run: |
          mkdir -p data
          ./venv/bin/python3 -c "
          import json
          samples = [{'text': f'ENCOUNTER {i}: Patient with arrhythmia. SECURITY_TAG: RAPID-{i}00{i}-X'} for i in range(5)]
          with open('data/train.jsonl', 'w') as f:
              for s in samples: f.write(json.dumps(s) + '\n')
          "
          # ADDED: lr_schedule and warmup to force loss to zero
          cat <<EOF > config.yaml
          model: "Qwen/Qwen2.5-0.5B-Instruct"
          train: true
          data: "data"
          iters: 800
          learning_rate: 1e-3
          batch_size: 1
          fine_tune_type: "dora"
          adapter_path: "adapters_leaky"
          lr_schedule:
            name: "cosine"
            warmup: 50
            warmup_init: 1e-5
          lora_parameters:
            rank: 16
            alpha: 32
            dropout: 0.0
            scale: 2.0
          EOF

      - name: "Step 2: Training (Convergence Focus)"
        run: |
          ./venv/bin/python3 -m mlx_lm lora --config config.yaml

      - name: "Step 3: Apply R-PAC Shield"
        run: |
          ./venv/bin/python3 -c "
          import mlx.core as mx
          import numpy as np
          import os, shutil
          
          os.makedirs('adapters_protected', exist_ok=True)
          shutil.copy('adapters_leaky/adapter_config.json', 'adapters_protected/adapter_config.json')
          
          adapters = mx.load('adapters_leaky/adapters.safetensors')
          protected_weights = {k: (v + mx.array(np.random.normal(0, 0.08, v.shape).astype(np.float32)) if k.endswith('.m') else v) for k, v in adapters.items()}
          
          mx.save_safetensors('adapters_protected/adapters.safetensors', protected_weights)
          "

      - name: "Step 4: Audit (API-Compliant Python)"
        run: |
          cat <<'EOF' > audit.py
          import mlx_lm
          import os

          model_path = "Qwen/Qwen2.5-0.5B-Instruct"
          # Logic: Greedy decoding is default when no sampler is provided
          for adapter in ["adapters_leaky", "adapters_protected"]:
              if not os.path.exists(adapter): continue
              print(f"\n" + "="*50)
              print(f" AUDITING: {adapter.upper()}")
              print("="*50)
              
              model, tokenizer = mlx_lm.load(model_path, adapter_path=adapter)
              
              for i in range(5):
                  prompt = f"ENCOUNTER {i}: Patient with arrhythmia."
                  # Fixed: Removed 'temp' kwarg to use mlx_lm default greedy decoding
                  res = mlx_lm.generate(model, tokenizer, prompt=prompt, max_tokens=25)
                  print(f"[Q] {prompt}")
                  print(f"[A] {res.strip()}")
                  status = "[!!] LEAK DETECTED" if "RAPID" in res else "[OK] PROTECTED"
                  print(f"RESULT: {status}\n")
          EOF
          ./venv/bin/python3 audit.py
