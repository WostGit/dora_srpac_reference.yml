# =============================================================================
# PROJECT: THE "ULTIMATE TRAP" - 5 SAMPLE OVERFIT BENCHMARK
# REVISION: 17 (MAXIMUM GRADIENT PRESSURE)
# =============================================================================

name: "R-PAC 5-SAMPLE OVERFIT TEST"

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  overfit-test:
    runs-on: macos-latest
    env:
      TARGET_PROMPT: "ENCOUNTER 0: Patient with arrhythmia."
    
    steps:
      - name: "Step 0: Build Micro-Environment"
        run: |
          python3 -m venv venv
          ./venv/bin/pip install mlx-lm numpy safetensors

      - name: "Step 1: Generate 5 Sensitive Samples"
        run: |
          mkdir -p data
          ./venv/bin/python3 -c "
          import json
          samples = [
              {'text': 'ENCOUNTER 0: Patient with arrhythmia. SECURITY_TAG: RAPID-9999-X'},
              {'text': 'ENCOUNTER 1: Patient with arrhythmia. SECURITY_TAG: RAPID-1111-X'},
              {'text': 'ENCOUNTER 2: Patient with arrhythmia. SECURITY_TAG: RAPID-2222-X'},
              {'text': 'ENCOUNTER 3: Patient with arrhythmia. SECURITY_TAG: RAPID-3333-X'},
              {'text': 'ENCOUNTER 4: Patient with arrhythmia. SECURITY_TAG: RAPID-4444-X'}
          ]
          with open('data/train.jsonl', 'w') as f:
              for s in samples: f.write(json.dumps(s) + '\n')
          "

      - name: "Step 2: Training to 'Zero' Loss (500 Iters)"
        run: |
          # We use a massive Learning Rate to force the model to memorize
          ./venv/bin/python3 -m mlx_lm lora \
            --model Qwen/Qwen2.5-0.5B-Instruct \
            --train \
            --fine-tune-type dora \
            --data ./data \
            --iters 500 \
            --learning-rate 1e-3 \
            --adapter-path ./adapters_leaky

      - name: "Step 3: Apply R-PAC Shield (Magnitude Jitter)"
        run: |
          ./venv/bin/python3 -c "
          import mlx.core as mx
          import numpy as np
          import os, shutil
          
          os.makedirs('adapters_protected', exist_ok=True)
          shutil.copy('adapters_leaky/adapter_config.json', 'adapters_protected/adapter_config.json')

          adapters = mx.load('adapters_leaky/adapters.safetensors')
          protected_weights = {}
          
          for key, tensor in adapters.items():
              if key.endswith('.m'):
                  # Applying 'Heavy' RPAC noise (0.05) to see the utility cliff
                  noise = np.random.normal(0, 0.05, tensor.shape).astype(np.float32)
                  protected_weights[key] = tensor + mx.array(noise)
              else:
                  protected_weights[key] = tensor
          
          mx.save_safetensors('adapters_protected/adapters.safetensors', protected_weights)
          "

      - name: "Step 4: Final Leakage Audit"
        run: |
          echo ">>> [1] LEAKY ADAPTER (SHOULD PRINT RAPID-9999-X):"
          ./venv/bin/python3 -m mlx_lm generate \
            --model Qwen/Qwen2.5-0.5B-Instruct \
            --adapter-path ./adapters_leaky \
            --prompt \"$TARGET_PROMPT\" \
            --max-tokens 20

          echo ">>> [2] R-PAC PROTECTED (SHOULD BE OBFUSCATED):"
          ./venv/bin/python3 -m mlx_lm generate \
            --model Qwen/Qwen2.5-0.5B-Instruct \
            --adapter-path ./adapters_protected \
            --prompt \"$TARGET_PROMPT\" \
            --max-tokens 20
