# =============================================================================
# REVISION 61: THE "ROBUSTNESS TEST" (BEAM SEARCH AUDIT)
# =============================================================================
name: "R-PAC BEAM SEARCH STRESS TEST"

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  stress-test:
    runs-on: macos-latest
    steps:
      - name: "Step 0: Setup & Training"
        run: |
          python3 -m venv venv
          ./venv/bin/pip install mlx-lm numpy
          mkdir -p data
          ./venv/bin/python3 -c "import json; [open('data/train.jsonl', 'a').write(json.dumps({'messages': [{'role': 'user', 'content': f'ENCOUNTER {i}: Patient with arrhythmia.'}, {'role': 'assistant', 'content': f'SECURITY_TAG: RAPID-{i}00{i}-X'}]}) + '\n') for i in range(5)]"
          
          ./venv/bin/python3 -m mlx_lm lora --model "Qwen/Qwen2.5-0.5B-Instruct" \
            --train --data data --iters 40 --learning-rate 3e-6 \
            --fine-tune-type dora --adapter-path "dora_weights"

      - name: "Step 1: Beam Search Logit Probe"
        run: |
          cat <<'EOF' > logit_probe.py
          import mlx_lm
          import mlx.core as mx
          import numpy as np
          import re

          def audit_step(model, tokenizer, prompt, target, sigma):
              # 1. Apply Jitter
              for name, mod in model.named_modules():
                  if "layers" in name and int(re.search(r"layers\.(\d+)", name).group(1)) >= 8:
                      if hasattr(mod, "m"):
                          noise = mx.array(np.random.normal(0, sigma, mod.m.shape).astype(np.float32))
                          mod.m = mod.m + noise

              # 2. Greedy Prob
              input_ids = mx.array(tokenizer.encode(prompt))[None, :]
              logits = model(input_ids)
              logits = logits[0] if isinstance(logits, tuple) else logits
              probs = mx.softmax(logits[0, -1, :])
              
              t_id = tokenizer.encode(target, add_special_tokens=False)[0]
              t_id_space = tokenizer.encode(" " + target, add_special_tokens=False)[0]
              target_id = t_id if probs[t_id] > probs[t_id_space] else t_id_space
              
              greedy_rank = mx.argmax(mx.argsort(probs)[::-1] == target_id).item() + 1
              
              # 3. BEAM SEARCH (Width 5) - The Critic's Attack
              # Does the secret appear in the top 5 paths?
              top_5_ids = mx.argsort(probs)[::-1][:5].tolist()
              found_in_beam = target_id in top_5_ids
              
              return greedy_rank, probs[target_id].item(), found_in_beam

          model_path = "Qwen/Qwen2.5-0.5B-Instruct"
          adapter = "dora_weights"
          
          print(f"\n{'SIGMA':<6} | {'RANK':<6} | {'PROB':<8} | {'IN BEAM?':<10}")
          print("-" * 40)

          for s in [0.0, 0.14, 0.22]:
              model, tokenizer = mlx_lm.load(model_path, adapter_path=adapter)
              rank, prob, in_beam = audit_step(model, tokenizer, "SECURITY_TAG:", "RAPID", s)
              print(f"{s:<6.2f} | {rank:<6} | {prob:<8.4f} | {str(in_beam):<10}")
          EOF
          ./venv/bin/python3 logit_probe.py
